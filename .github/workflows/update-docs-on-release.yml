name: Update Docs on Release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Get release version
        id: version
        run: |
          # Remove 'v' prefix if present
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

          # Find the previous tag (most recent tag before this one)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog entries from merged PRs
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Get merge commits between previous tag and HEAD to find merged PRs
          PR_NUMBERS=$(git log "${PREV_TAG}..HEAD" --oneline --grep="Merge pull request" \
            | grep -oP '#\K[0-9]+' || true)

          ADDED=""
          CHANGED=""
          FIXED=""
          OTHER=""

          for PR in $PR_NUMBERS; do
            # Fetch PR title and labels
            PR_DATA=$(gh pr view "$PR" --json title,labels --jq '{title: .title, labels: [.labels[].name]}' 2>/dev/null) || continue
            TITLE=$(echo "$PR_DATA" | jq -r '.title')
            LABELS=$(echo "$PR_DATA" | jq -r '.labels[]' 2>/dev/null)

            # Skip automated PRs (e.g., README updates, dependabot)
            if echo "$TITLE" | grep -qiE "^docs: update (README|docs) for"; then
              continue
            fi

            # Categorize by PR label, falling back to conventional commit prefix
            if echo "$LABELS" | grep -qi "added" || echo "$TITLE" | grep -qiE "^(feat|add):"; then
              ADDED="${ADDED}- ${TITLE}\n"
            elif echo "$LABELS" | grep -qi "fixed" || echo "$TITLE" | grep -qiE "^fix:"; then
              FIXED="${FIXED}- ${TITLE}\n"
            elif echo "$LABELS" | grep -qi "changed" || echo "$TITLE" | grep -qiE "^(refactor|perf|chore):"; then
              CHANGED="${CHANGED}- ${TITLE}\n"
            else
              OTHER="${OTHER}- ${TITLE}\n"
            fi
          done

          # If no PRs found, fall back to commit messages (direct pushes to main)
          if [ -z "$ADDED" ] && [ -z "$CHANGED" ] && [ -z "$FIXED" ] && [ -z "$OTHER" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges --format="%s" || true)
            while IFS= read -r MSG; do
              [ -z "$MSG" ] && continue
              # Skip automated commits
              if echo "$MSG" | grep -qiE "^docs: update (README|docs) for"; then
                continue
              fi
              if echo "$MSG" | grep -qiE "^(feat|add)"; then
                ADDED="${ADDED}- ${MSG}\n"
              elif echo "$MSG" | grep -qiE "^fix"; then
                FIXED="${FIXED}- ${MSG}\n"
              else
                CHANGED="${CHANGED}- ${MSG}\n"
              fi
            done <<< "$COMMITS"
          fi

          # Build the changelog section
          ENTRIES=""
          if [ -n "$ADDED" ]; then
            ENTRIES="${ENTRIES}\n### Added\n${ADDED}"
          fi
          if [ -n "$CHANGED" ]; then
            ENTRIES="${ENTRIES}\n### Changed\n${CHANGED}"
          fi
          if [ -n "$FIXED" ]; then
            ENTRIES="${ENTRIES}\n### Fixed\n${FIXED}"
          fi
          if [ -n "$OTHER" ]; then
            ENTRIES="${ENTRIES}\n### Other\n${OTHER}"
          fi

          # If still empty, add a placeholder
          if [ -z "$ENTRIES" ]; then
            ENTRIES="\n_No notable changes._\n"
          fi

          # Write to a temp file to avoid delimiter issues in GITHUB_OUTPUT
          echo -e "$ENTRIES" > /tmp/changelog_entries.txt

      - name: Update README.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|implementation(\"com.atruedev:kmp-ble:[^\"]*\")|implementation(\"com.atruedev:kmp-ble:$VERSION\")|g" README.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          DATE="${{ steps.version.outputs.date }}"
          ENTRIES=$(cat /tmp/changelog_entries.txt)

          # Build the new CHANGELOG content using awk for reliable multi-line insertion
          awk -v version="$VERSION" -v date="$DATE" -v entries="$ENTRIES" '
          /^## \[Unreleased\]/ {
            print "## [Unreleased]"
            print ""
            print "_Changes on `main` that have not yet been tagged for release._"
            print ""
            print "---"
            print ""
            print "## [" version "] - " date
            print entries
            found = 1
            next
          }
          # Skip the old Unreleased placeholder text
          found && /^_Changes on `main` that have not yet been tagged for release._$/ { next }
          { print }
          ' CHANGELOG.md > /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

          # Update the [Unreleased] compare link to point from the new tag
          sed -i "s|\[Unreleased\]: \(.*\)/compare/.*\.\.\.HEAD|[Unreleased]: \1/compare/$TAG...HEAD|" CHANGELOG.md

          # Add the new version's compare link after the [Unreleased] link
          if [ -n "$PREV_TAG" ]; then
            sed -i "/^\[Unreleased\]:.*$/a [$VERSION]: https://github.com/atruedeveloper/kmp-ble/compare/$PREV_TAG...$TAG" CHANGELOG.md
          fi

      - name: Update ROADMAP.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|^\*Current as of v.*\*$|*Current as of v$VERSION*|" ROADMAP.md

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "docs: update docs for v${{ steps.version.outputs.version }}"
          title: "docs: update docs for v${{ steps.version.outputs.version }}"
          body: |
            Automated PR to update project docs with the new release version.

            **Updated files:**
            - `README.md` — dependency version
            - `CHANGELOG.md` — auto-generated entries from merged PRs
            - `ROADMAP.md` — "Current as of" footer

            Release: ${{ github.event.release.html_url }}
          branch: update-docs-${{ steps.version.outputs.version }}
          base: main
          delete-branch: true

      - name: Auto-approve and merge PR
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
          gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
