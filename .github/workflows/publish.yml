name: Publish

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build Android
        run: ./gradlew compileAndroidMain
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build XCFramework
        run: ./gradlew assembleXCFramework
        env:
          VERSION: ${{ github.ref_name }}

      - name: Zip XCFramework
        run: |
          cd build/XCFrameworks/release
          zip -r KmpBle.xcframework.zip KmpBle.xcframework

      - name: Create release and upload XCFramework
        run: |
          gh release create ${{ github.ref_name }} \
            build/XCFrameworks/release/KmpBle.xcframework.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift
        run: |
          VERSION=${{ github.ref_name }}
          CHECKSUM=$(swift package compute-checksum build/XCFrameworks/release/KmpBle.xcframework.zip)
          sed -i '' "s|VERSION_PLACEHOLDER|${VERSION}|g" Package.swift
          sed -i '' "s|CHECKSUM_PLACEHOLDER|${CHECKSUM}|g" Package.swift
          git config user.email "gary@atruedev.com"
          git config user.name "Gary Quinn"
          git add Package.swift
          git commit -m "update Package.swift for ${VERSION}"
          git push origin HEAD:main
