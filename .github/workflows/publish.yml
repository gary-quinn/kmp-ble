name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_url: ${{ steps.release.outputs.release_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build XCFramework
        run: ./gradlew assembleXCFramework
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Zip XCFramework
        run: |
          cd build/XCFrameworks/release
          zip -r KmpBle.xcframework.zip KmpBle.xcframework

      - name: Create release and upload XCFramework
        id: release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true
          gh release upload ${{ github.ref_name }} \
            build/XCFrameworks/release/KmpBle.xcframework.zip \
            --clobber
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Package.swift checksum artifact
        run: |
          VERSION=${{ github.ref_name }}
          CHECKSUM=$(swift package compute-checksum build/XCFrameworks/release/KmpBle.xcframework.zip)
          echo "VERSION=$VERSION" > package-checksum.txt
          echo "CHECKSUM=$CHECKSUM" >> package-checksum.txt

      - uses: actions/upload-artifact@eaeb399d4867acaad5ec458c095db6bc2c22c9e3 # v7.0.1
        with:
          name: package-checksum
          path: package-checksum.txt

  deploy-api-docs:
    needs: publish
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate API docs (Dokka)
        run: ./gradlew dokkaGenerate
        env:
          VERSION: ${{ needs.publish.outputs.version }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  update-docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Download Package.swift checksum
        uses: actions/download-artifact@5eb6532fd2b9a88089ae413748ffc7c2e85a3258 # v6.0.0
        with:
          name: package-checksum

      - name: Read checksum
        id: pkg
        run: |
          cat package-checksum.txt >> $GITHUB_OUTPUT

      - name: Update Package.swift
        run: |
          VERSION="${{ steps.pkg.outputs.VERSION }}"
          CHECKSUM="${{ steps.pkg.outputs.CHECKSUM }}"
          cat > Package.swift << SWIFT
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "KmpBle",
              platforms: [.iOS(.v15)],
              products: [
                  .library(name: "KmpBle", targets: ["KmpBle"]),
              ],
              targets: [
                  .binaryTarget(
                      name: "KmpBle",
                      url: "https://github.com/gary-quinn/kmp-ble/releases/download/${VERSION}/KmpBle.xcframework.zip",
                      checksum: "${CHECKSUM}"
                  ),
              ]
          )
          SWIFT

      - name: Get release metadata
        id: meta
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ needs.publish.outputs.tag }}$" | head -1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          # Use the last docs-update merge commit as the changelog baseline.
          # This avoids re-including PRs already listed in the previous version's
          # CHANGELOG section (those PRs were merged after the previous tag but
          # documented in that version's auto-update-docs commit).
          DOCS_BASELINE=$(git log --oneline --grep="^docs: update docs for v" --merges --format="%H" | head -1)
          echo "docs_baseline=${DOCS_BASELINE:-$PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog entries from merged PRs
        id: changelog
        uses: gary-quinn/shared-actions/changelog@4975dde119744969d162d01444f13e2515c639c2 # v1
        with:
          prev_tag: ${{ steps.meta.outputs.docs_baseline }}
          current_tag: ${{ needs.publish.outputs.tag }}

      - name: Update README.md
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          sed -i -E "s|implementation\(\"com\.atruedev:(kmp-ble[a-z-]*):[^\"]*\"\)|implementation(\"com.atruedev:\1:$VERSION\")|g" README.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          TAG="${{ needs.publish.outputs.tag }}"
          PREV_TAG="${{ steps.meta.outputs.prev_tag }}"
          DATE="${{ steps.meta.outputs.date }}"
          ENTRIES=$(cat ${{ steps.changelog.outputs.entries_file }})

          # Build the new CHANGELOG content using awk for reliable multi-line insertion
          awk -v version="$VERSION" -v date="$DATE" -v entries="$ENTRIES" '
          /^## \[Unreleased\]/ {
            print "## [Unreleased]"
            print ""
            print "_Changes on `main` that have not yet been tagged for release._"
            print ""
            print "---"
            print ""
            print "## [" version "] - " date
            print entries
            found = 1
            next
          }
          # Skip the old Unreleased placeholder text
          found && /^_Changes on `main` that have not yet been tagged for release._$/ { next }
          { print }
          ' CHANGELOG.md > /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

          # Update the [Unreleased] compare link to point from the new tag
          sed -i "s|\[Unreleased\]: \(.*\)/compare/.*\.\.\.HEAD|[Unreleased]: \1/compare/$TAG...HEAD|" CHANGELOG.md

          # Add the new version's compare link after the [Unreleased] link
          if [ -n "$PREV_TAG" ]; then
            sed -i "/^\[Unreleased\]:.*$/a [$VERSION]: https://github.com/gary-quinn/kmp-ble/compare/$PREV_TAG...$TAG" CHANGELOG.md
          fi

      - name: Update llms.txt
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          sed -i -E "s|implementation\(\"com\.atruedev:(kmp-ble[a-z-]*):[^\"]*\"\)|implementation(\"com.atruedev:\1:$VERSION\")|g" llms.txt

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs: update docs for v${{ needs.publish.outputs.version }}"
          title: "docs: update docs for v${{ needs.publish.outputs.version }}"
          body: |
            Automated PR to update project docs with the new release version.

            **Updated files:**
            - `README.md` - dependency version
            - `CHANGELOG.md` - auto-generated entries from merged PRs
            - `llms.txt` - dependency version
            - `Package.swift` - XCFramework checksum

            Release: ${{ needs.publish.outputs.release_url }}
          branch: update-docs-${{ needs.publish.outputs.version }}
          base: main
          delete-branch: true

      - name: Auto-approve and merge PR
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
          gh pr merge --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
