name: Update README Version

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Get release version
        id: version
        run: |
          # Remove 'v' prefix if present
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update the implementation line in README
          sed -i "s|implementation(\"com.atruedev:kmp-ble:[^\"]*\")|implementation(\"com.atruedev:kmp-ble:$VERSION\")|g" README.md

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "docs: update README for v${{ steps.version.outputs.version }}"
          title: "docs: update README for v${{ steps.version.outputs.version }}"
          body: |
            Automated PR to update README.md with the new release version.
            
            Release: ${{ github.event.release.html_url }}
          branch: update-readme-${{ steps.version.outputs.version }}
          base: main
          delete-branch: true
       
      - name: Auto-approve and merge PR
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
          gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
